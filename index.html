<!DOCTYPE html>
 <html lang="en">

 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Pomodoro Timer</title>
     <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="/path/to/font-awesome/css/all.min.css">
     <link rel="javascript" href="script.js">

 </head>

 <body>
     <div class="bg-container" id="bgContainer">
         <h1 class="heading">Pomodoro Timer</h1>
         <div class="buttons-section">
             <button class="break-button" id="shortBreak">Short break</button>
             <button class="focus-button" id="focus">Focus</button>
             <button class="long-break-button" id="longBreak">Long break</button>
         </div>
         <div class="image-section">
             <img src="https://cdn3d.iconscout.com/3d/premium/thumb/pomodoro-timer-15041414-12323207.png" class="tomato-img" id="pomodoro">
             <div class="play-section">
                 <button class="play-button" id="playButton">▶ <span id="mins">1:00 min</span>
                     <p><span id="seconds"></span></p>
                 </button>
                 <!-- <p class="timer">25:00</p> -->
             </div>

         </div>

     </div>

     <script src="script.js"></script>
     <script type="text/javascript" src="https://new-assets.ccbp.in/frontend/content/static-ccbp-ui-kit/static-ccbp-ui-kit.js"></script>

 </body>

 </html>
